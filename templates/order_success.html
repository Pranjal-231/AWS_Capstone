<!DOCTYPE html>
<html>
<head>
    <title>Order Confirmed</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background-color: #f9f9f9; }
        .card { background: white; max-width: 500px; margin: auto; padding: 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #28a745; margin-bottom: 10px; }
        .details { text-align: left; background: #f1f1f1; padding: 20px; border-radius: 5px; margin: 20px 0; }
        .btn { background-color: #007bff; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎉 Order Placed Successfully!</h1>
        <p>Thank you for shopping with BookStore Manager.</p>

        <div class="details">
            <p><b>Delivery to:</b><br> {{ address }}</p>
            <p><b>Payment Mode:</b> {{ payment }}</p>
        </div>

        <p>You will receive an email confirmation shortly.</p>
        <br>
        <a href="/" class="btn">Continue Shopping</a>
    </div>

</body>
</html>
